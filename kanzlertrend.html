<style>
  :root {
    --bg: #0b1424;
    --panel: #121d30;
    --panel-2: #0e1826;
    --border: #1e2c42;
    --text: #f4f6fb;
    --text-dim: #8fa0bc;

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  #root { max-width: 1100px; margin: 0 auto; padding: 28px; }
  .ut-display { font-family: 'Archivo', 'Inter', sans-serif; font-weight: 800; }
  .ut-hero { display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 24px; }
  .ut-hero-number { font-size: 64px; line-height: 1; letter-spacing: -0.02em; }
  .ut-hero-meta { color: var(--text-dim); font-size: 13px; margin-bottom: 6px; }

  .ut-chips { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .ut-chip { display: flex; align-items: center; gap: 8px; background: var(--panel); border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font-size: 13px; }
  .ut-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .ut-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 20px; }
  .ut-panel h3 { margin: 0 0 14px 0; font-size: 15px; font-weight: 700; }
  .ut-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .ut-field { display: flex; flex-direction: column; gap: 6px; min-width: 140px; }
  .ut-field label { font-size: 12px; color: var(--text-dim); }
  .ut-field input, .ut-field select { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px 10px; font-size: 14px; outline: none; }
  .ut-field input:focus, .ut-field select:focus { border-color: var(--accent); }
  .ut-party-values { display: flex; gap: 10px; flex-wrap: wrap; }
  .ut-party-value { display: flex; flex-direction: column; gap: 6px; width: 90px; }
  .ut-party-value label { font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .ut-btn { background: var(--accent); color: white; border: none; border-radius: 6px; padding: 9px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .ut-btn:hover { filter: brightness(1.1); }
  .ut-btn.secondary { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
  .ut-btn.danger { background: #3a1420; color: #ff8fa3; border: 1px solid #5a1f30; }

  .ut-sum { font-size: 12px; color: var(--text-dim); margin-top: 8px; }
  table.ut-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.ut-table th, table.ut-table td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  table.ut-table th { color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .ut-toggle-link { color: var(--text-dim); font-size: 13px; cursor: pointer; text-decoration: underline; }
  .ut-tools { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .ut-status { font-size: 13px; color: var(--text-dim); margin-top: 8px; }
  .ut-hint { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-top: 10px; }
  .ut-chart-empty { color: var(--text-dim); font-size: 13px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect } = React;

// ---------- Hilfsfunktionen ----------
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const todayISO = () => new Date().toISOString().slice(0, 10);
const tsOf = (dateStr) => new Date(dateStr + "T00:00:00").getTime();
const fmtDateShort = (ts) => new Date(ts).toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "2-digit" });
const fmtDateLong = (ts) => new Date(ts).toLocaleDateString("de-DE", { day: "2-digit", month: "long", year: "numeric" });

const b64EncodeUtf8 = (str) => btoa(unescape(encodeURIComponent(str)));
const b64DecodeUtf8 = (b64) => decodeURIComponent(escape(atob(b64.replace(/\n/g, ""))));

const STATE_KEY = "kanzlertrend-state";
const GITHUB_CONFIG_KEY = "kanzlertrend-github-config";
const POLL_PAGE_SIZE = 15;

const DEFAULT_PARTIES = [
  { id: "kanzler_zufrieden", name: "Kanzler zufrieden", color: "#46962B", active: true, group: "Kanzler", primary: true },
  { id: "kanzler_unzufrieden", name: "Kanzler unzufrieden", color: "#E3000F", active: true, group: "Kanzler", primary: false },
  { id: "regierung_zufrieden", name: "Regierung zufrieden", color: "#3F9EDB", active: true, group: "Regierung", primary: true },
  { id: "regierung_unzufrieden", name: "Regierung unzufrieden", color: "#E08A2C", active: true, group: "Regierung", primary: false },
];

const DEFAULT_INSTITUTE_WEIGHTS = {
  "infratest dimap": 1.2,
  "Forschungsgruppe Wahlen": 1.2,
  "Ipsos": 1.0,
};

function loadSavedState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (err) {
    return null;
  }
}
function loadGithubConfig() {
  try {
    const raw = localStorage.getItem(GITHUB_CONFIG_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (err) {
    return null;
  }
}
const savedState = loadSavedState();
const savedGithubConfig = loadGithubConfig();

const recencyWeight = (pollDate, asOfDate, halfLifeDays, maxAgeDays) => {
  const diffDays = (tsOf(asOfDate) - tsOf(pollDate)) / 86400000;
  if (diffDays < 0) return 0;
  if (diffDays > maxAgeDays) return 0;
  return Math.pow(0.5, diffDays / halfLifeDays);
};

function weightedAverages(polls, parties, instituteWeights, halfLifeDays, maxAgeDays, asOfDate) {
  const sums = {};
  const weightSums = {};
  parties.forEach((p) => { sums[p.id] = 0; weightSums[p.id] = 0; });
  polls.forEach((poll) => {
    if (tsOf(poll.date) > tsOf(asOfDate)) return;
    const storedWeight = instituteWeights[poll.institute];
    const iW = Math.max(0, typeof storedWeight === "number" ? storedWeight : 1);
    const rW = recencyWeight(poll.date, asOfDate, halfLifeDays, maxAgeDays);
    const w = iW * rW;
    if (w <= 0) return;
    parties.forEach((p) => {
      const v = poll.values[p.id];
      if (typeof v === "number" && !isNaN(v)) {
        sums[p.id] += v * w;
        weightSums[p.id] += w;
      }
    });
  });
  const result = {};
  parties.forEach((p) => {
    result[p.id] = weightSums[p.id] > 0 ? sums[p.id] / weightSums[p.id] : null;
  });
  return result;
}

// ---------- Eigenständiger SVG-Chart (keine externe Chart-Bibliothek noetig) ----------
function TrendChart({ trendSeries, rawByParty, parties }) {
  const width = 900, height = 380;
  const margin = { top: 20, right: 20, bottom: 30, left: 40 };
  const innerW = width - margin.left - margin.right;
  const innerH = height - margin.top - margin.bottom;

  const allRaw = parties.flatMap((p) => rawByParty[p.id] || []);
  const allTs = [...trendSeries.map((r) => r.ts), ...allRaw.map((r) => r.ts)];
  if (allTs.length === 0) {
    return <div className="ut-chart-empty">Noch keine Daten für einen Verlauf. Trage unten Umfragen ein.</div>;
  }
  const minTs = Math.min(...allTs);
  const maxTs = Math.max(...allTs);

  const allVals = [
    ...trendSeries.flatMap((r) => parties.map((p) => r[p.id]).filter((v) => typeof v === "number")),
    ...allRaw.map((r) => r.value),
  ];
  const maxVal = allVals.length ? Math.max(...allVals) : 50;
  const yMax = Math.max(10, Math.ceil((maxVal + 5) / 5) * 5);

  const xScale = (ts) => margin.left + (maxTs === minTs ? 0.5 : (ts - minTs) / (maxTs - minTs)) * innerW;
  const yScale = (v) => margin.top + innerH - (v / yMax) * innerH;

  const yTicks = [0, 1, 2, 3, 4, 5].map((i) => Math.round((yMax * i) / 5));
  const xTickCount = Math.min(6, Math.max(2, trendSeries.length));
  const xTicks = Array.from({ length: xTickCount }, (_, i) => minTs + (maxTs - minTs) * (i / (xTickCount - 1 || 1)));

  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width: "100%", height: "auto" }}>
      {yTicks.map((v) => (
        <g key={"y" + v}>
          <line x1={margin.left} x2={width - margin.right} y1={yScale(v)} y2={yScale(v)} stroke="var(--border)" strokeDasharray="3 3" />
          <text x={margin.left - 8} y={yScale(v) + 4} textAnchor="end" fontSize="11" fill="var(--text-dim)">{v}%</text>
        </g>
      ))}
      {xTicks.map((t, i) => (
        <text key={"x" + i} x={xScale(t)} y={height - 8} textAnchor="middle" fontSize="11" fill="var(--text-dim)">
          {fmtDateShort(t)}
        </text>
      ))}
      {parties.map((p) => {
        const raw = rawByParty[p.id] || [];
        const trendPoints = trendSeries
          .filter((r) => typeof r[p.id] === "number")
          .map((r) => xScale(r.ts) + "," + yScale(r[p.id]))
          .join(" ");
        return (
          <g key={p.id}>
            {raw.map((pt, idx) => (
              <circle key={idx} cx={xScale(pt.ts)} cy={yScale(pt.value)} r="3.5" fill={p.color} opacity="0.4">
                <title>{p.name + ": " + pt.value.toFixed(1).replace(".", ",") + "% am " + fmtDateLong(pt.ts)}</title>
              </circle>
            ))}
            {trendPoints && <polyline points={trendPoints} fill="none" stroke={p.color} strokeWidth="2.5" />}
          </g>
        );
      })}
    </svg>
  );
}

// ---------- Hauptkomponente ----------
function Zufriedenheitstrend() {
  const [parties, setParties] = useState((savedState && savedState.parties) || DEFAULT_PARTIES);
  const [polls, setPolls] = useState((savedState && savedState.polls) || []);
  const [instituteWeights, setInstituteWeights] = useState((savedState && savedState.instituteWeights) || DEFAULT_INSTITUTE_WEIGHTS);
  const [instituteActive, setInstituteActive] = useState((savedState && savedState.instituteActive) || {});
  const [halfLifeDays, setHalfLifeDays] = useState(
    savedState && typeof savedState.halfLifeDays === "number" ? savedState.halfLifeDays : 21
  );
  const [maxAgeDays, setMaxAgeDays] = useState(
    savedState && typeof savedState.maxAgeDays === "number" ? savedState.maxAgeDays : 365
  );

  const [showSettings, setShowSettings] = useState(false);
  const [showGithub, setShowGithub] = useState(true);

  const [formInstitute, setFormInstitute] = useState("");
  const [formDate, setFormDate] = useState(todayISO());
  const [formValues, setFormValues] = useState({});
  const [editingId, setEditingId] = useState(null);
  const [formError, setFormError] = useState("");

  const [newPartyName, setNewPartyName] = useState("");
  const [newPartyColor, setNewPartyColor] = useState("#8884d8");
  const [newPartyGroup, setNewPartyGroup] = useState("");

  const [ghOwner, setGhOwner] = useState((savedGithubConfig && savedGithubConfig.owner) || "");
  const [ghRepo, setGhRepo] = useState((savedGithubConfig && savedGithubConfig.repo) || "");
  const [ghPath, setGhPath] = useState((savedGithubConfig && savedGithubConfig.path) || "zufriedenheitsdaten.json");
  const [ghBranch, setGhBranch] = useState((savedGithubConfig && savedGithubConfig.branch) || "main");
  const [ghToken, setGhToken] = useState((savedGithubConfig && savedGithubConfig.remember && savedGithubConfig.token) || "");
  const [ghRememberToken, setGhRememberToken] = useState(!!(savedGithubConfig && savedGithubConfig.remember));
  const [ghSha, setGhSha] = useState(null);
  const [ghStatus, setGhStatus] = useState("Noch nicht verbunden.");
  const [ghBusy, setGhBusy] = useState(false);
  const [ghConnected, setGhConnected] = useState(false);
  const ghSaveTimer = useRef(null);
  const didAutoConnect = useRef(false);

  const fileInputRef = useRef(null);

  const activeParties = parties.filter((p) => p.active);

  const instituteNames = useMemo(() => {
    const s = new Set(Object.keys(instituteWeights));
    polls.forEach((p) => s.add(p.institute));
    return Array.from(s).sort();
  }, [instituteWeights, polls]);

  const isInstituteActive = (name) => instituteActive[name] !== false;

  const includedPolls = useMemo(
    () => polls.filter((p) => isInstituteActive(p.institute)),
    [polls, instituteActive]
  );

  const asOfDate = todayISO();

  const currentTrend = useMemo(
    () => weightedAverages(includedPolls, activeParties, instituteWeights, halfLifeDays, maxAgeDays, asOfDate),
    [includedPolls, activeParties, instituteWeights, halfLifeDays, maxAgeDays]
  );

  const groups = useMemo(() => {
    const order = [];
    const map = {};
    activeParties.forEach((p) => {
      const g = p.group || "Sonstige";
      if (!map[g]) { map[g] = []; order.push(g); }
      map[g].push(p);
    });
    return order.map((g) => {
      const cats = map[g];
      const primary = cats.find((c) => c.primary) || cats[0];
      return { name: g, categories: cats, primary };
    });
  }, [activeParties]);

  const trendSeries = useMemo(() => {
    const uniqueDates = Array.from(new Set(includedPolls.map((p) => p.date))).sort();
    return uniqueDates.map((d) => {
      const avgs = weightedAverages(includedPolls, activeParties, instituteWeights, halfLifeDays, maxAgeDays, d);
      const row = { ts: tsOf(d) };
      activeParties.forEach((p) => { row[p.id] = avgs[p.id]; });
      return row;
    });
  }, [includedPolls, activeParties, instituteWeights, halfLifeDays, maxAgeDays]);

  const rawByParty = useMemo(() => {
    const map = {};
    activeParties.forEach((p) => {
      map[p.id] = includedPolls
        .filter((poll) => typeof poll.values[p.id] === "number")
        .map((poll) => ({ ts: tsOf(poll.date), value: poll.values[p.id] }));
    });
    return map;
  }, [includedPolls, activeParties]);

  const lastPollDate = useMemo(() => {
    if (includedPolls.length === 0) return null;
    return includedPolls.reduce((max, p) => (p.date > max ? p.date : max), includedPolls[0].date);
  }, [includedPolls]);

  const sortedPolls = useMemo(() => [...polls].sort((a, b) => (a.date < b.date ? 1 : -1)), [polls]);
  const [visiblePollCount, setVisiblePollCount] = useState(POLL_PAGE_SIZE);

  // ---------- Lokaler Zwischenspeicher (Browser dieses Geräts) ----------
  useEffect(() => {
    try {
      localStorage.setItem(STATE_KEY, JSON.stringify({ parties, polls, instituteWeights, instituteActive, halfLifeDays, maxAgeDays }));
    } catch (err) {
      // Speicher voll oder blockiert - kein hartes Problem, GitHub bleibt die Quelle der Wahrheit
    }
  }, [parties, polls, instituteWeights, instituteActive, halfLifeDays, maxAgeDays]);

  // ---------- GitHub Sync ----------
  function saveGithubConfig(remember) {
    const cfg = { owner: ghOwner, repo: ghRepo, path: ghPath, branch: ghBranch, remember, token: remember ? ghToken : "" };
    try {
      localStorage.setItem(GITHUB_CONFIG_KEY, JSON.stringify(cfg));
    } catch (err) {}
  }

  function forgetGithubConnection() {
    setGhConnected(false);
    setGhToken("");
    setGhRememberToken(false);
    setGhSha(null);
    try {
      localStorage.setItem(
        GITHUB_CONFIG_KEY,
        JSON.stringify({ owner: ghOwner, repo: ghRepo, path: ghPath, branch: ghBranch, remember: false, token: "" })
      );
    } catch (err) {}
    setGhStatus("Verbindung getrennt.");
  }

  async function githubLoad() {
    if (!ghOwner || !ghRepo || !ghPath || !ghToken) {
      setGhStatus("Bitte Owner, Repo, Pfad und Token ausfüllen.");
      return;
    }
    setGhBusy(true);
    setGhStatus("Lade von GitHub …");
    try {
      const url = "https://api.github.com/repos/" + ghOwner + "/" + ghRepo + "/contents/" + encodeURIComponent(ghPath) + "?ref=" + encodeURIComponent(ghBranch);
      const res = await fetch(url, {
        headers: { Authorization: "Bearer " + ghToken, Accept: "application/vnd.github+json" },
      });
      if (res.status === 404) {
        setGhSha(null);
        setGhConnected(true);
        saveGithubConfig(ghRememberToken);
        setGhStatus("Verbunden. Datei existiert noch nicht — wird jetzt angelegt …");
        setGhBusy(false);
        await githubSave();
        return;
      }
      if (!res.ok) {
        setGhStatus("Fehler beim Laden (Status " + res.status + "). Token/Repo/Pfad prüfen.");
        setGhBusy(false);
        return;
      }
      const json = await res.json();
      setGhSha(json.sha);
      const decoded = b64DecodeUtf8(json.content);
      const data = JSON.parse(decoded);
      if (data.parties) setParties(data.parties);
      if (data.polls) setPolls(data.polls);
      if (data.instituteWeights) setInstituteWeights(data.instituteWeights);
      if (data.instituteActive) setInstituteActive(data.instituteActive);
      if (typeof data.halfLifeDays === "number") setHalfLifeDays(data.halfLifeDays);
      if (typeof data.maxAgeDays === "number") setMaxAgeDays(data.maxAgeDays);
      setGhConnected(true);
      saveGithubConfig(ghRememberToken);
      setGhStatus("Verbunden. Zuletzt von GitHub geladen.");
    } catch (err) {
      setGhStatus("Netzwerkfehler beim Laden von GitHub. Owner/Repo/Branch und Internetverbindung prüfen.");
    }
    setGhBusy(false);
  }

  async function githubSave() {
    if (!ghOwner || !ghRepo || !ghPath || !ghToken) {
      setGhStatus("Bitte Owner, Repo, Pfad und Token ausfüllen.");
      return;
    }
    setGhBusy(true);
    setGhStatus("Speichere auf GitHub …");
    try {
      const payload = { parties, polls, instituteWeights, instituteActive, halfLifeDays, maxAgeDays };
      const content = b64EncodeUtf8(JSON.stringify(payload, null, 2));
      const url = "https://api.github.com/repos/" + ghOwner + "/" + ghRepo + "/contents/" + encodeURIComponent(ghPath);
      const body = { message: "Umfragedaten aktualisiert (" + todayISO() + ")", content: content, branch: ghBranch };
      if (ghSha) body.sha = ghSha;
      const res = await fetch(url, {
        method: "PUT",
        headers: { Authorization: "Bearer " + ghToken, Accept: "application/vnd.github+json" },
        body: JSON.stringify(body),
      });
      const json = await res.json();
      if (!res.ok) {
        setGhStatus("Fehler beim Speichern (Status " + res.status + "): " + (json.message || ""));
        setGhBusy(false);
        return;
      }
      setGhSha(json.content && json.content.sha ? json.content.sha : null);
      setGhStatus("Synchronisiert · " + new Date().toLocaleTimeString("de-DE"));
    } catch (err) {
      setGhStatus("Netzwerkfehler beim Speichern auf GitHub.");
    }
    setGhBusy(false);
  }

  // Beim ersten Laden automatisch verbinden, falls Token gemerkt wurde
  useEffect(() => {
    if (!didAutoConnect.current && ghRememberToken && ghToken && ghOwner && ghRepo && ghPath) {
      didAutoConnect.current = true;
      githubLoad();
    }
    // eslint-disable-next-line
  }, []);

  // Bei jeder Änderung, wenn verbunden: verzögert zu GitHub synchronisieren
  useEffect(() => {
    if (!ghConnected) return;
    if (ghSaveTimer.current) clearTimeout(ghSaveTimer.current);
    ghSaveTimer.current = setTimeout(() => { githubSave(); }, 1500);
    return () => clearTimeout(ghSaveTimer.current);
    // eslint-disable-next-line
  }, [parties, polls, instituteWeights, instituteActive, halfLifeDays, maxAgeDays, ghConnected]);

  // ---------- Formular-Handling ----------
  function resetForm() {
    setFormInstitute("");
    setFormDate(todayISO());
    setFormValues({});
    setEditingId(null);
    setFormError("");
  }

  function loadPollIntoForm(poll) {
    setFormInstitute(poll.institute);
    setFormDate(poll.date);
    setFormValues({ ...poll.values });
    setEditingId(poll.id);
    setFormError("");
  }

  function submitPoll(e) {
    e.preventDefault();
    if (!formInstitute.trim()) { setFormError("Bitte ein Institut angeben."); return; }
    if (!formDate) { setFormError("Bitte ein Datum angeben."); return; }
    const cleanValues = {};
    activeParties.forEach((p) => {
      const v = formValues[p.id];
      if (v !== undefined && v !== "" && !isNaN(parseFloat(v))) cleanValues[p.id] = parseFloat(v);
    });
    if (Object.keys(cleanValues).length === 0) { setFormError("Bitte mindestens einen Parteiwert eintragen."); return; }

    if (!instituteWeights[formInstitute.trim()] && instituteWeights[formInstitute.trim()] !== 0) {
      setInstituteWeights((prev) => ({ ...prev, [formInstitute.trim()]: 1 }));
    }

    if (editingId) {
      setPolls((prev) => prev.map((p) => (p.id === editingId ? { ...p, institute: formInstitute.trim(), date: formDate, values: cleanValues } : p)));
    } else {
      setPolls((prev) => [...prev, { id: uid(), institute: formInstitute.trim(), date: formDate, values: cleanValues }]);
    }
    resetForm();
  }

  function deletePoll(id) {
    setPolls((prev) => prev.filter((p) => p.id !== id));
    if (editingId === id) resetForm();
  }

  const formSumsByGroup = useMemo(() => {
    const sums = {};
    groups.forEach((g) => {
      let s = 0;
      let any = false;
      g.categories.forEach((p) => {
        const v = formValues[p.id];
        const n = parseFloat(v);
        if (v !== undefined && v !== "" && !isNaN(n)) { s += n; any = true; }
      });
      sums[g.name] = any ? s : null;
    });
    return sums;
  }, [formValues, groups]);

  function toggleActive(id) { setParties((prev) => prev.map((p) => (p.id === id ? { ...p, active: !p.active } : p))); }
  function removeParty(id) { setParties((prev) => prev.filter((p) => p.id !== id)); }
  function updatePartyColor(id, color) { setParties((prev) => prev.map((p) => (p.id === id ? { ...p, color } : p))); }
  function updatePartyName(id, name) { setParties((prev) => prev.map((p) => (p.id === id ? { ...p, name } : p))); }
  function updatePartyGroup(id, group) { setParties((prev) => prev.map((p) => (p.id === id ? { ...p, group } : p))); }
  function togglePartyPrimary(id) {
    setParties((prev) => prev.map((p) => (p.id === id ? { ...p, primary: !p.primary } : p)));
  }
  function addParty() {
    if (!newPartyName.trim()) return;
    setParties((prev) => [...prev, { id: uid(), name: newPartyName.trim(), color: newPartyColor, active: true, group: newPartyGroup.trim() || "Sonstige", primary: false }]);
    setNewPartyName("");
    setNewPartyColor("#8884d8");
    setNewPartyGroup("");
  }
  function updateInstituteWeight(name, w) { setInstituteWeights((prev) => ({ ...prev, [name]: w })); }
  function toggleInstituteActive(name) {
    setInstituteActive((prev) => ({ ...prev, [name]: prev[name] === false ? true : false }));
  }
  function addInstituteManually() {
    const name = window.prompt("Name des neuen Instituts:");
    if (name && name.trim() && instituteWeights[name.trim()] === undefined) {
      setInstituteWeights((prev) => ({ ...prev, [name.trim()]: 1 }));
    }
  }
  function removeInstitute(name) {
    setInstituteWeights((prev) => { const next = { ...prev }; delete next[name]; return next; });
  }

  function exportJson() {
    const payload = { parties, polls, instituteWeights, instituteActive, halfLifeDays, maxAgeDays };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "zufriedenheitsdaten.json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function importJsonFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.parties) setParties(data.parties);
        if (data.polls) setPolls(data.polls);
        if (data.instituteWeights) setInstituteWeights(data.instituteWeights);
      if (data.instituteActive) setInstituteActive(data.instituteActive);
        if (typeof data.halfLifeDays === "number") setHalfLifeDays(data.halfLifeDays);
      if (typeof data.maxAgeDays === "number") setMaxAgeDays(data.maxAgeDays);
        setGhStatus("JSON erfolgreich importiert.");
      } catch (err) {
        setGhStatus("Fehler beim Einlesen: Datei ist kein gültiges JSON.");
      }
    };
    reader.readAsText(file);
  }

  function exportSnapshot() {
    const node = document.getElementById("ut-export-area");
    if (!node || !window.html2canvas) return;
    setGhStatus("Erzeuge Bild …");

    // Klon des Inhalts, damit die Live-Seite unberührt bleibt
    const clone = node.cloneNode(true);
    clone.removeAttribute("id");

    const frame = document.createElement("div");
    frame.style.cssText = [
      "position:fixed",
      "top:0",
      "left:-10000px",
      "width:1000px",
      "padding:48px",
      "background:linear-gradient(160deg, #15223a 0%, #0b1424 65%)",
      "border:1px solid #263953",
      "border-radius:26px",
      "font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif",
      "color:#f4f6fb",
      "box-sizing:border-box",
    ].join(";");

    const header = document.createElement("div");
    header.style.cssText = "display:flex;align-items:center;gap:10px;margin-bottom:22px;";
    header.innerHTML =
      '<span style="width:10px;height:10px;border-radius:50%;background:#3f6ea5;display:inline-block;"></span>' +
      '<span style="font-family:\'Archivo\',\'Inter\',sans-serif;font-weight:800;font-size:14px;letter-spacing:0.14em;text-transform:uppercase;color:#8fa0bc;">Zufriedenheitstrend</span>';

    const footer = document.createElement("div");
    footer.style.cssText = "margin-top:28px;padding-top:16px;border-top:1px solid #263953;display:flex;justify-content:space-between;font-size:12px;color:#8fa0bc;";
    footer.innerHTML =
      "<span>Gewichteter Trend auf Basis manuell erfasster Umfragen</span>" +
      "<span>" + fmtDateLong(Date.now()) + "</span>";

    frame.appendChild(header);
    frame.appendChild(clone);
    frame.appendChild(footer);
    document.body.appendChild(frame);

    window.html2canvas(frame, { backgroundColor: null, scale: 2, useCORS: true })
      .then((canvas) => {
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "umfragetrend-" + todayISO() + ".png";
          a.click();
          URL.revokeObjectURL(url);
        });
        document.body.removeChild(frame);
        setGhStatus("Bild erzeugt und heruntergeladen.");
      })
      .catch(() => {
        document.body.removeChild(frame);
        setGhStatus("Fehler beim Erzeugen des Bildes.");
      });
  }

  return (
    <div>
      <div className="ut-panel">
        <h3>{editingId ? "Umfrage bearbeiten" : "Neue Umfrage eintragen"}</h3>
        <form onSubmit={submitPoll}>
          <div className="ut-row">
            <div className="ut-field" style={{ minWidth: 200 }}>
              <label>Institut</label>
              <input list="ut-institute-list" value={formInstitute} onChange={(e) => setFormInstitute(e.target.value)} placeholder="z. B. Forsa" />
              <datalist id="ut-institute-list">
                {instituteNames.map((n) => <option value={n} key={n} />)}
              </datalist>
            </div>
            <div className="ut-field">
              <label>Datum</label>
              <input type="date" value={formDate} onChange={(e) => setFormDate(e.target.value)} max={todayISO()} />
            </div>
          </div>

          <div style={{ height: 14 }} />
          <div className="ut-field" style={{ marginBottom: 8 }}><label>Werte je Kategorie (%)</label></div>
          <div className="ut-party-values">
            {activeParties.map((p) => (
              <div className="ut-party-value" key={p.id}>
                <label><span className="ut-dot" style={{ background: p.color }} />{p.name}</label>
                <input type="number" step="0.1" min="0" max="100" value={formValues[p.id] !== undefined ? formValues[p.id] : ""}
                  onChange={(e) => setFormValues((prev) => ({ ...prev, [p.id]: e.target.value }))} />
              </div>
            ))}
          </div>
          <div className="ut-sum">
            {groups.map((g) => {
              const s = formSumsByGroup[g.name];
              if (s === null || s === undefined) return null;
              const off = s < 95 || s > 105;
              return (
                <span key={g.name} style={{ marginRight: 16 }}>
                  {g.name}: {s.toFixed(1).replace(".", ",")}%{off ? " — prüfen, weicht deutlich von 100% ab" : ""}
                </span>
              );
            })}
          </div>
          {formError && <div className="ut-error">{formError}</div>}
          <div className="ut-tools">
            <button className="ut-btn" type="submit">{editingId ? "Änderungen speichern" : "Umfrage hinzufügen"}</button>
            {editingId && <button className="ut-btn secondary" type="button" onClick={resetForm}>Abbrechen</button>}
          </div>
        </form>
      </div>

      <div id="ut-export-area">
      <div className="ut-hero" style={{ alignItems: "flex-start" }}>
        {groups.length === 0 && (
          <div>
            <div className="ut-hero-label">Aktueller Trend</div>
            <div className="ut-display ut-hero-number" style={{ color: "var(--text-dim)" }}>—</div>
            <div className="ut-hero-meta">Noch keine Kategorien aktiv</div>
          </div>
        )}
        {groups.map((g) => {
          const v = g.primary ? currentTrend[g.primary.id] : null;
          return (
            <div key={g.name}>
              <div className="ut-hero-label">{g.name}</div>
              {v !== null && v !== undefined ? (
                <div className="ut-display ut-hero-number" style={{ color: g.primary.color, fontSize: 48 }}>
                  {v.toFixed(1).replace(".", ",")}%
                </div>
              ) : (
                <div className="ut-display ut-hero-number" style={{ color: "var(--text-dim)", fontSize: 48 }}>—</div>
              )}
              <div className="ut-hero-meta">{g.primary ? g.primary.name : ""}</div>
              <div className="ut-chips">
                {g.categories.map((p) => (
                  <div className="ut-chip" key={p.id}>
                    <span className="ut-dot" style={{ background: p.color }} />
                    {p.name}: {currentTrend[p.id] !== null && currentTrend[p.id] !== undefined ? currentTrend[p.id].toFixed(1).replace(".", ",") + "%" : "–"}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
        <div style={{ alignSelf: "flex-end" }}>
          <div className="ut-hero-meta">
            {lastPollDate ? "zuletzt erfasst am " + fmtDateLong(tsOf(lastPollDate)) : "Noch keine Umfragen erfasst"}
          </div>
        </div>
        </div>

      <div className="ut-panel">
        <h3>Verlauf (gewichteter Trend, Punkte = einzelne Umfragen)</h3>
        <TrendChart trendSeries={trendSeries} rawByParty={rawByParty} parties={activeParties} />
      </div>
      </div>

      <div className="ut-panel">
        <h3>Erfasste Umfragen ({polls.length})</h3>
        {polls.length === 0 ? (
          <div className="ut-status">Noch keine Umfragen erfasst.</div>
        ) : (
          <>
          <table className="ut-table">
            <thead>
              <tr>
                <th>Institut</th><th>Datum</th>
                {activeParties.map((p) => <th key={p.id}>{p.name}</th>)}
                <th></th>
              </tr>
            </thead>
            <tbody>
              {sortedPolls.slice(0, visiblePollCount).map((poll) => {
                const active = isInstituteActive(poll.institute);
                return (
                <tr key={poll.id} style={{ opacity: active ? 1 : 0.5 }}>
                  <td>{poll.institute}{!active && <span style={{ color: "var(--text-dim)", fontSize: 11 }}> (ausgeblendet)</span>}</td>
                  <td>{fmtDateShort(tsOf(poll.date))}</td>
                  {activeParties.map((p) => (
                    <td key={p.id}>{typeof poll.values[p.id] === "number" ? poll.values[p.id].toFixed(1).replace(".", ",") + "%" : "–"}</td>
                  ))}
                  <td>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button className="ut-btn secondary" style={{ padding: "4px 10px" }} onClick={() => loadPollIntoForm(poll)}>Bearbeiten</button>
                      <button className="ut-btn danger" style={{ padding: "4px 10px" }} onClick={() => deletePoll(poll.id)}>Löschen</button>
                    </div>
                  </td>
                </tr>
                );
              })}
            </tbody>
          </table>
          {sortedPolls.length > visiblePollCount && (
            <div className="ut-tools">
              <button className="ut-btn secondary" onClick={() => setVisiblePollCount((n) => n + POLL_PAGE_SIZE)}>
                Ältere Umfragen anzeigen ({sortedPolls.length - visiblePollCount} weitere)
              </button>
            </div>
          )}
          </>
        )}
      </div>

      <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
        <span className="ut-status" style={{ margin: 0 }}>
          {ghConnected ? "GitHub: " + ghStatus : "Lokal (dieser Browser): gespeichert"}
        </span>
        <button className="ut-btn secondary" style={{ padding: "6px 12px" }} onClick={exportSnapshot}>
          Bild für Substack exportieren
        </button>
      </div>

      <div className="ut-panel">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <h3 style={{ margin: 0 }}>Einstellungen: Kategorien, Institute, Gewichtung</h3>
          <span className="ut-toggle-link" onClick={() => setShowSettings((s) => !s)}>{showSettings ? "einklappen" : "aufklappen"}</span>
        </div>
        {showSettings && (
          <div style={{ marginTop: 16 }}>
            <h3 style={{ fontSize: 13 }}>Kategorien</h3>
            <div className="ut-hint" style={{ marginTop: -6, marginBottom: 10 }}>
              Kategorien mit derselben „Gruppe" werden im Kopfbereich zusammen dargestellt und dort auf ~100%
              Summe geprüft (z. B. „Kanzler zufrieden" + „Kanzler unzufrieden"). „Primär" bestimmt, welcher Wert
              der Gruppe als große Zahl im Kopfbereich erscheint.
            </div>
            <table className="ut-table">
              <thead><tr><th>Aktiv</th><th>Farbe</th><th>Name</th><th>Gruppe</th><th>Primär</th><th></th></tr></thead>
              <tbody>
                {parties.map((p) => (
                  <tr key={p.id}>
                    <td><input type="checkbox" checked={p.active} onChange={() => toggleActive(p.id)} /></td>
                    <td><input type="color" value={p.color} onChange={(e) => updatePartyColor(p.id, e.target.value)} style={{ width: 36, height: 26, padding: 0, border: "none", background: "none" }} /></td>
                    <td><input value={p.name} onChange={(e) => updatePartyName(p.id, e.target.value)} style={{ background: "var(--panel-2)", border: "1px solid var(--border)", color: "var(--text)", borderRadius: 6, padding: "4px 8px" }} /></td>
                    <td><input value={p.group || ""} onChange={(e) => updatePartyGroup(p.id, e.target.value)} placeholder="z. B. Kanzler" style={{ width: 110, background: "var(--panel-2)", border: "1px solid var(--border)", color: "var(--text)", borderRadius: 6, padding: "4px 8px" }} /></td>
                    <td><input type="checkbox" checked={!!p.primary} onChange={() => togglePartyPrimary(p.id)} /></td>
                    <td><button className="ut-btn danger" style={{ padding: "4px 10px" }} onClick={() => removeParty(p.id)}>Entfernen</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div className="ut-row" style={{ marginTop: 12 }}>
              <div className="ut-field"><label>Neue Kategorie</label><input value={newPartyName} onChange={(e) => setNewPartyName(e.target.value)} placeholder="Name" /></div>
              <div className="ut-field"><label>Gruppe</label><input value={newPartyGroup} onChange={(e) => setNewPartyGroup(e.target.value)} placeholder="z. B. Kanzler" /></div>
              <div className="ut-field"><label>Farbe</label><input type="color" value={newPartyColor} onChange={(e) => setNewPartyColor(e.target.value)} style={{ width: 50, height: 36, padding: 0, border: "none" }} /></div>
              <button className="ut-btn" type="button" onClick={addParty}>Hinzufügen</button>
            </div>

            <div style={{ height: 24 }} />
            <h3 style={{ fontSize: 13 }}>Institute (Gewichtung &amp; Ein-/Ausschluss)</h3>
            <div className="ut-hint" style={{ marginTop: -6, marginBottom: 10 }}>
              1,0 = neutraler Standard. Höhere Werte zählen stärker in den Trend, niedrigere schwächer.
              Über „Aktiv" lässt sich ein Institut komplett aus Schnitt und Grafik heraus- oder wieder
              hereinrechnen, ohne seine Umfragen zu löschen.
            </div>
            <table className="ut-table">
              <thead><tr><th>Aktiv</th><th>Institut</th><th>Gewicht</th><th></th></tr></thead>
              <tbody>
                {instituteNames.map((name) => {
                  const w = instituteWeights[name] !== undefined ? instituteWeights[name] : 1;
                  const active = isInstituteActive(name);
                  return (
                    <tr key={name} style={{ opacity: active ? 1 : 0.5 }}>
                      <td><input type="checkbox" checked={active} onChange={() => toggleInstituteActive(name)} /></td>
                      <td>{name}</td>
                      <td>
                        <input type="number" step="0.05" min="0" value={w}
                          onChange={(e) => updateInstituteWeight(name, parseFloat(e.target.value))}
                          style={{ width: 80, background: "var(--panel-2)", border: "1px solid var(--border)", color: "var(--text)", borderRadius: 6, padding: "4px 8px" }} />
                      </td>
                      <td><button className="ut-btn danger" style={{ padding: "4px 10px" }} onClick={() => removeInstitute(name)}>Entfernen</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div className="ut-tools">
              <button className="ut-btn secondary" type="button" onClick={addInstituteManually}>Institut manuell hinzufügen</button>
            </div>

            <div style={{ height: 24 }} />
            <h3 style={{ fontSize: 13 }}>Aktualität</h3>
            <div className="ut-field" style={{ maxWidth: 320 }}>
              <label>Halbwertszeit: {halfLifeDays} Tage (Umfragen verlieren nach dieser Zeit die Hälfte ihres Gewichts)</label>
              <input type="range" min="3" max="90" value={halfLifeDays} onChange={(e) => setHalfLifeDays(parseInt(e.target.value, 10))} />
            </div>
            <div style={{ height: 16 }} />
            <div className="ut-field" style={{ maxWidth: 320 }}>
              <label>Höchstalter: {maxAgeDays} Tage (Umfragen darüber hinaus zählen mit Gewicht 0, unabhängig von der Halbwertszeit)</label>
              <input type="range" min="30" max="720" step="5" value={maxAgeDays} onChange={(e) => setMaxAgeDays(parseInt(e.target.value, 10))} />
            </div>
          </div>
        )}
      </div>

      <div className="ut-panel">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <h3 style={{ margin: 0 }}>GitHub-Speicherung {ghConnected && <span style={{ color: "#7fd88f" }}>· verbunden</span>}</h3>
          <span className="ut-toggle-link" onClick={() => setShowGithub((s) => !s)}>{showGithub ? "einklappen" : "aufklappen"}</span>
        </div>
        {showGithub && (
          <div style={{ marginTop: 16 }}>
            <div className="ut-hint" style={{ marginTop: 0, marginBottom: 14 }}>
              Diese Seite läuft außerhalb von claude.ai, deshalb funktioniert die direkte Verbindung zur
              GitHub-API hier normal. Einmal verbunden, wird jede Änderung automatisch in die JSON-Datei in
              deinem Repository geschrieben.
            </div>
            <div className="ut-row">
              <div className="ut-field"><label>GitHub-Benutzer/-Organisation</label><input value={ghOwner} onChange={(e) => setGhOwner(e.target.value)} placeholder="z. B. maxmustermann" disabled={ghConnected} /></div>
              <div className="ut-field"><label>Repository</label><input value={ghRepo} onChange={(e) => setGhRepo(e.target.value)} placeholder="z. B. umfragetrend" disabled={ghConnected} /></div>
              <div className="ut-field"><label>Pfad zur Datei</label><input value={ghPath} onChange={(e) => setGhPath(e.target.value)} disabled={ghConnected} /></div>
              <div className="ut-field"><label>Branch</label><input value={ghBranch} onChange={(e) => setGhBranch(e.target.value)} disabled={ghConnected} /></div>
              <div className="ut-field" style={{ minWidth: 220 }}><label>Personal Access Token</label><input type="password" value={ghToken} onChange={(e) => setGhToken(e.target.value)} placeholder="ghp_…" disabled={ghConnected} /></div>
            </div>
            <div style={{ marginTop: 10, fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}>
              <input type="checkbox" id="ut-remember-token" checked={ghRememberToken} disabled={ghConnected} onChange={(e) => setGhRememberToken(e.target.checked)} />
              <label htmlFor="ut-remember-token" style={{ color: "var(--text-dim)" }}>
                Token in diesem Browser merken, damit sich die Seite künftig automatisch verbindet
              </label>
            </div>
            <div className="ut-tools">
              {!ghConnected ? (
                <button className="ut-btn" disabled={ghBusy} onClick={githubLoad}>Verbinden</button>
              ) : (
                <>
                  <button className="ut-btn" disabled={ghBusy} onClick={githubSave}>Jetzt synchronisieren</button>
                  <button className="ut-btn secondary" onClick={forgetGithubConnection}>Verbindung trennen</button>
                </>
              )}
            </div>
            {ghStatus && <div className="ut-status">{ghStatus}</div>}
            <div className="ut-hint">
              Erzeuge auf github.com unter Settings → Developer settings → Fine-grained tokens ein Token, das nur
              für dieses eine Repository gilt und die Berechtigung „Contents: Read and write" besitzt. Der Token
              wird — nur wenn du „merken" aktivierst — im lokalen Speicher dieses Browsers auf diesem Gerät
              abgelegt, nirgendwo sonst. Auf einem gemeinsam genutzten Rechner solltest du das lieber lassen.
            </div>

            <div style={{ height: 20 }} />
            <div className="ut-hint" style={{ marginBottom: 8 }}>Manuelle Alternative:</div>
            <div className="ut-tools">
              <button className="ut-btn secondary" onClick={exportJson}>Als JSON exportieren</button>
              <button className="ut-btn secondary" onClick={() => fileInputRef.current && fileInputRef.current.click()}>JSON importieren</button>
              <input ref={fileInputRef} type="file" accept="application/json" style={{ display: "none" }} onChange={(e) => e.target.files[0] && importJsonFile(e.target.files[0])} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Zufriedenheitstrend />);
</script>
</body>
</html>
